<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Settings | BX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --black: #0a0a0a;
            --surface: #111111;
            --surface-2: #1a1a1a;
            --accent: #D90429;
            --accent-2: #8D0801;
            --text: #f5f5f5;
            --text-dim: #888888;
            --border: #2a2a2a;
            --sidebar-width: 260px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--black); color: var(--text); display: flex; min-height: 100vh; overflow-x: hidden; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.03'/%3E%3C/svg%3E"); pointer-events: none; z-index: 9999; opacity: 0.4; }
        h1, h2, h3, .brand-font { font-family: 'Bebas Neue', sans-serif; letter-spacing: 2px; text-transform: uppercase; }
        .admin-sidebar { width: var(--sidebar-width); background: var(--surface); border-right: 1px solid var(--border); position: fixed; height: 100vh; display: flex; flex-direction: column; z-index: 10; }
        .admin-brand { padding: 2rem; border-bottom: 1px solid var(--border); }
        .logo { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--text); text-decoration: none; letter-spacing: 4px; }
        .logo span { color: var(--accent); }
        .admin-nav { padding: 2rem 0; flex: 1; }
        .admin-nav-item { display: flex; align-items: center; padding: 1rem 2rem; color: var(--text-dim); text-decoration: none; font-family: 'Space Grotesk', sans-serif; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px; transition: all 0.3s; border-left: 3px solid transparent; }
        .admin-nav-item i { width: 24px; font-size: 1.1rem; margin-right: 10px; }
        .admin-nav-item:hover, .admin-nav-item.active { color: var(--accent); background: var(--surface-2); border-left-color: var(--accent); }
        .admin-nav-item.logout { margin-top: auto; color: var(--accent-2); }
        .admin-nav-item.logout:hover { color: var(--black); background: var(--accent-2); border-left-color: var(--accent-2); }
        .admin-main { flex: 1; margin-left: var(--sidebar-width); padding: 2rem; z-index: 5; overflow-y: auto; max-height: 100vh; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
        .admin-title { font-size: 2.5rem; margin: 0; }
        .admin-profile { display: flex; align-items: center; gap: 1rem; font-family: 'Space Grotesk', sans-serif; font-size: 0.9rem; }
        .profile-avatar { width: 44px; height: 44px; background: var(--accent); color: var(--black); display: flex; align-items: center; justify-content: center; font-weight: 700; }
        .settings-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 1.5rem; padding: 2rem; max-width: 760px; }
        .input-group { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.2rem; }
        .input-group label { color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; font-size: 0.75rem; }
        .input-group input, .input-group textarea { width: 100%; padding: 0.95rem 1rem; background: var(--surface-2); border: 1px solid var(--border); color: var(--text); border-radius: 1rem; }
        .input-group textarea { min-height: 140px; resize: vertical; }
        .btn-save { background: var(--accent); color: var(--black); border: none; padding: 0.9rem 1.5rem; border-radius: 999px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; font-family: 'Space Grotesk', sans-serif; font-weight: 700; }
        .btn-save:hover { background: var(--text); color: var(--black); }
        @media (max-width: 992px) { .admin-sidebar { width: 80px; } .admin-brand .logo span, .admin-brand .logo::after { display: none; } .admin-nav-item span { display: none; } .admin-nav-item i { margin-right: 0; font-size: 1.5rem; margin: 0 auto; } .admin-main { margin-left: 80px; } }
        @media (max-width: 768px) { .admin-header { flex-direction: column; align-items: flex-start; gap: 1rem; } }
    </style>
</head>
<body>
    <aside class="admin-sidebar">
        <div class="admin-brand">
            <a href="index.html" class="logo">B<span>X</span></a>
        </div>
        <nav class="admin-nav">
            <a href="admin-dashboard.html" class="admin-nav-item">
                <i class="fas fa-chart-line"></i>
                <span>Dashboard</span>
            </a>
            <a href="admin-orders.html" class="admin-nav-item">
                <i class="fas fa-shopping-bag"></i>
                <span>Orders</span>
            </a>
            <a href="admin-products.html" class="admin-nav-item">
                <i class="fas fa-tshirt"></i>
                <span>Products</span>
            </a>
            <a href="admin-customers.html" class="admin-nav-item">
                <i class="fas fa-users"></i>
                <span>Customers</span>
            </a>
            <a href="admin-settings.html" class="admin-nav-item active">
                <i class="fas fa-cog"></i>
                <span>Settings</span>
            </a>
        </nav>
        <a href="index.html" class="admin-nav-item logout" style="margin-bottom: 2rem;">
            <i class="fas fa-sign-out-alt"></i>
            <span>Back to Store</span>
        </a>
    </aside>

    <main class="admin-main">
        <header class="admin-header">
            <div>
                <h1 class="admin-title">Settings</h1>
                <p style="color: var(--text-dim); margin-top: 0.5rem;">Configure store information, contact details, and currency settings.</p>
            </div>
            <div class="admin-profile">
                <span id="adminProfileLabel">Admin</span>
                <div class="profile-avatar" id="adminAvatar">A</div>
            </div>
        </header>

        <section class="settings-panel">
            <form id="settingsForm">
                <div class="input-group">
                    <label for="storeName">Store Name</label>
                    <input id="storeName" name="storeName" required />
                </div>
                <div class="input-group">
                    <label for="storeEmail">Contact Email</label>
                    <input id="storeEmail" name="storeEmail" type="email" required />
                </div>
                <div class="input-group">
                    <label for="storePhone">Contact Phone</label>
                    <input id="storePhone" name="storePhone" required />
                </div>
                <div class="input-group">
                    <label for="storeCurrency">Currency Label</label>
                    <input id="storeCurrency" name="currency" required />
                </div>
                <div class="input-group">
                    <label for="storeAddress">Store Address</label>
                    <textarea id="storeAddress" name="address"></textarea>
                </div>
                <button type="submit" class="btn-save">Save Settings</button>
            </form>
        </section>
    </main>

    <script src="auth.js"></script>
    <script src="admin.js"></script>
    <script>
        function renderSettings() {
            const settings = admin.getSettings();
            document.getElementById('storeName').value = settings.storeName || '';
            document.getElementById('storeEmail').value = settings.storeEmail || '';
            document.getElementById('storePhone').value = settings.storePhone || '';
            document.getElementById('storeCurrency').value = settings.currency || '';
            document.getElementById('storeAddress').value = settings.address || '';
        }

        function saveSettings(event) {
            event.preventDefault();
            const settings = {
                storeName: document.getElementById('storeName').value.trim(),
                storeEmail: document.getElementById('storeEmail').value.trim(),
                storePhone: document.getElementById('storePhone').value.trim(),
                currency: document.getElementById('storeCurrency').value.trim(),
                address: document.getElementById('storeAddress').value.trim(),
            };
            admin.saveSettings(settings);
            alert('Settings saved successfully');
        }

        document.getElementById('settingsForm').addEventListener('submit', saveSettings);

        document.addEventListener('DOMContentLoaded', () => {
            if (!auth.isLoggedIn() || !auth.isAdmin()) {
                window.location.href = 'login.html';
                return;
            }
            if (!admin) return;
            const user = auth.getCurrentUser();
            if (user) {
                document.getElementById('adminProfileLabel').textContent = user.fullName || user.email;
                document.getElementById('adminAvatar').textContent = (user.fullName || user.email).charAt(0).toUpperCase();
            }
            renderSettings();
        });
    </script>
</body>
</html>
