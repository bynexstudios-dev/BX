<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Products | BX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --black: #0a0a0a;
            --surface: #111111;
            --surface-2: #1a1a1a;
            --accent: #D90429;
            --accent-2: #8D0801;
            --text: #f5f5f5;
            --text-dim: #888888;
            --border: #2a2a2a;
            --sidebar-width: 260px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--black); color: var(--text); display: flex; min-height: 100vh; overflow-x: hidden; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.03'/%3E%3C/svg%3E"); pointer-events: none; z-index: 9999; opacity: 0.4; }
        h1, h2, h3, .brand-font { font-family: 'Bebas Neue', sans-serif; letter-spacing: 2px; text-transform: uppercase; }
        .admin-sidebar { width: var(--sidebar-width); background: var(--surface); border-right: 1px solid var(--border); position: fixed; height: 100vh; display: flex; flex-direction: column; z-index: 10; }
        .admin-brand { padding: 2rem; border-bottom: 1px solid var(--border); }
        .logo { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--text); text-decoration: none; letter-spacing: 4px; }
        .logo span { color: var(--accent); }
        .admin-nav { padding: 2rem 0; flex: 1; }
        .admin-nav-item { display: flex; align-items: center; padding: 1rem 2rem; color: var(--text-dim); text-decoration: none; font-family: 'Space Grotesk', sans-serif; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px; transition: all 0.3s; border-left: 3px solid transparent; }
        .admin-nav-item i { width: 24px; font-size: 1.1rem; margin-right: 10px; }
        .admin-nav-item:hover, .admin-nav-item.active { color: var(--accent); background: var(--surface-2); border-left-color: var(--accent); }
        .admin-nav-item.logout { margin-top: auto; color: var(--accent-2); }
        .admin-nav-item.logout:hover { color: var(--black); background: var(--accent-2); border-left-color: var(--accent-2); }
        .admin-main { flex: 1; margin-left: var(--sidebar-width); padding: 2rem; z-index: 5; overflow-y: auto; max-height: 100vh; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
        .admin-title { font-size: 2.5rem; margin: 0; }
        .admin-profile { display: flex; align-items: center; gap: 1rem; font-family: 'Space Grotesk', sans-serif; font-size: 0.9rem; }
        .profile-avatar { width: 44px; height: 44px; background: var(--accent); color: var(--black); display: flex; align-items: center; justify-content: center; font-weight: 700; }
        .admin-table { width: 100%; border-collapse: collapse; margin-bottom: 1.5rem; }
        .admin-table th, .admin-table td { padding: 1rem 0.8rem; text-align: left; border-bottom: 1px solid var(--border); }
        .admin-table th { font-family: 'Space Grotesk', sans-serif; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-dim); font-weight: 500; }
        .btn-add, .btn-save { background: var(--accent); color: var(--black); border: none; padding: 0.8rem 1.2rem; border-radius: 999px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; font-family: 'Space Grotesk', sans-serif; font-weight: 700; }
        .btn-add:hover, .btn-save:hover { background: var(--text); color: var(--black); }
        .action-btn { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 1.1rem; margin-right: 0.8rem; transition: color 0.3s; }
        .action-btn:hover { color: var(--accent); }
        .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: none; align-items: center; justify-content: center; z-index: 2000; overflow-y: auto; padding: 20px 0; }
        .modal-backdrop.active { display: flex; }
        .modal { width: min(95%, 720px); max-height: calc(100vh - 80px); overflow-y: auto; background: var(--surface); border: 1px solid var(--border); border-radius: 1.5rem; padding: 2rem; }
        .modal h2 { margin-bottom: 1rem; }
        .modal-grid { display: grid; gap: 1rem; }
        .input-group { display: flex; flex-direction: column; gap: 0.5rem; font-family: 'Space Grotesk', sans-serif; }
        .input-group label { color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; font-size: 0.75rem; }
        .input-group input, .input-group textarea, .input-group select { width: 100%; padding: 0.95rem 1rem; background: var(--surface-2); border: 1px solid var(--border); color: var(--text); border-radius: 1rem; }
        .input-group textarea { min-height: 120px; resize: vertical; }
        .image-preview { width: 100%; max-height: 260px; object-fit: cover; border-radius: 1rem; border: 1px solid var(--border); }
        @media (max-width: 992px) { .admin-sidebar { width: 80px; } .admin-brand .logo span, .admin-brand .logo::after { display: none; } .admin-nav-item span { display: none; } .admin-nav-item i { margin-right: 0; font-size: 1.5rem; margin: 0 auto; } .admin-main { margin-left: 80px; } }
        @media (max-width: 768px) { .admin-header { flex-direction: column; align-items: flex-start; gap: 1rem; } }
    </style>
</head>
<body>
    <aside class="admin-sidebar">
        <div class="admin-brand">
            <a href="index.html" class="logo">B<span>X</span></a>
        </div>
        <nav class="admin-nav">
            <a href="admin-dashboard.html" class="admin-nav-item">
                <i class="fas fa-chart-line"></i>
                <span>Dashboard</span>
            </a>
            <a href="admin-orders.html" class="admin-nav-item">
                <i class="fas fa-shopping-bag"></i>
                <span>Orders</span>
            </a>
            <a href="admin-products.html" class="admin-nav-item active">
                <i class="fas fa-tshirt"></i>
                <span>Products</span>
            </a>
            <a href="admin-customers.html" class="admin-nav-item">
                <i class="fas fa-users"></i>
                <span>Customers</span>
            </a>
            <a href="admin-settings.html" class="admin-nav-item">
                <i class="fas fa-cog"></i>
                <span>Settings</span>
            </a>
        </nav>
        <a href="index.html" class="admin-nav-item logout" style="margin-bottom: 2rem;">
            <i class="fas fa-sign-out-alt"></i>
            <span>Back to Store</span>
        </a>
    </aside>

    <main class="admin-main">
        <header class="admin-header">
            <div>
                <h1 class="admin-title">Products</h1>
                <p style="color: var(--text-dim); margin-top: 0.5rem;">Add, edit and publish product listings with image upload support.</p>
            </div>
            <div class="admin-profile">
                <span id="adminProfileLabel">Admin</span>
                <div class="profile-avatar" id="adminAvatar">A</div>
            </div>
        </header>

        <div class="table-container" style="margin-bottom: 2rem;">
            <div class="table-header" style="display:flex; justify-content: space-between; align-items:center;">
                <h2 class="table-title">Product Catalog</h2>
                <button class="btn-add" onclick="openProductModal()"><i class="fas fa-plus"></i> Add Product</button>
            </div>
            <table class="admin-table" id="productsTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Category</th>
                        <th>Price</th>
                        <th>Stock</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </main>

    <div class="modal-backdrop" id="productModal">
        <div class="modal">
            <h2 id="productModalTitle">Add Product</h2>
            <form id="productForm">
                <div class="modal-grid">
                    <div class="input-group">
                        <label for="productName">Product Name</label>
                        <input id="productName" name="name" required />
                    </div>
                    <div class="input-group">
                        <label for="productCategory">Category</label>
                        <select id="productCategory" name="category" required></select>
                    </div>
                    <div class="input-group">
                        <label for="productPrice">Price</label>
                        <input id="productPrice" name="price" type="number" min="0" required />
                    </div>
                    <div class="input-group">
                        <label for="productStock">Stock</label>
                        <input id="productStock" name="stock" type="number" min="0" required />
                    </div>
                    <div class="input-group">
                        <label for="productStatus">Status</label>
                        <select id="productStatus" name="status">
                            <option value="active">Active</option>
                            <option value="inactive">Inactive</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="productImage">Product Image</label>
                        <input id="productImage" name="image" type="file" accept="image/*" />
                    </div>
                    <div class="input-group">
                        <label>Image Preview</label>
                        <img id="productImagePreview" class="image-preview" src="" alt="Preview" style="display:none;" />
                    </div>
                    <div class="input-group" style="grid-column: 1 / -1;">
                        <label for="productDescription">Description</label>
                        <textarea id="productDescription" name="description"></textarea>
                    </div>
                </div>
                <div style="display:flex; justify-content:flex-end; gap:1rem; margin-top:1.5rem;">
                    <button type="button" class="btn-action" onclick="closeProductModal()">Cancel</button>
                    <button type="submit" class="btn-save">Save Product</button>
                </div>
            </form>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="admin.js"></script>
    <script>
        let editingProductId = null;
        let currentImageData = '';

        function renderProductsTable() {
            const products = admin.getProducts();
            const categories = admin.getCategories();
            const tbody = document.querySelector('#productsTable tbody');
            tbody.innerHTML = products.map(product => {
                const category = categories.find(c => c.id === product.category);
                return `
                    <tr>
                        <td>${product.id}</td>
                        <td>${product.name}</td>
                        <td>${category ? category.name : 'Uncategorized'}</td>
                        <td>${product.price.toLocaleString()}</td>
                        <td>${product.stock}</td>
                        <td>${product.status}</td>
                        <td>
                            <button class="action-btn" onclick="openProductModal(${product.id})"><i class="fas fa-edit"></i></button>
                            <button class="action-btn" onclick="removeProduct(${product.id})"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function populateCategoryOptions() {
            const select = document.getElementById('productCategory');
            select.innerHTML = admin.getCategories().map(cat => `<option value="${cat.id}">${cat.name}</option>`).join('');
        }

        function openProductModal(productId) {
            editingProductId = productId || null;
            populateCategoryOptions();
            const modal = document.getElementById('productModal');
            const title = document.getElementById('productModalTitle');
            const form = document.getElementById('productForm');
            const preview = document.getElementById('productImagePreview');

            if (productId) {
                const product = admin.getProductById(productId);
                title.textContent = 'Edit Product';
                form.productName.value = product.name;
                form.productCategory.value = product.category;
                form.productPrice.value = product.price;
                form.productStock.value = product.stock;
                form.productStatus.value = product.status;
                form.productDescription.value = product.description;
                currentImageData = product.image || '';
                if (currentImageData) {
                    preview.src = currentImageData;
                    preview.style.display = 'block';
                } else {
                    preview.style.display = 'none';
                }
            } else {
                title.textContent = 'Add Product';
                form.reset();
                currentImageData = '';
                preview.style.display = 'none';
            }

            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeProductModal() {
            document.getElementById('productModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        function handleImageChange(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = () => {
                currentImageData = reader.result;
                const preview = document.getElementById('productImagePreview');
                preview.src = currentImageData;
                preview.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }

        function saveProduct(event) {
            event.preventDefault();
            const form = event.target;
            const name = form.productName.value.trim();
            const category = Number(form.productCategory.value);
            const price = Number(form.productPrice.value);
            const stock = Number(form.productStock.value);
            const status = form.productStatus.value;
            const description = form.productDescription.value.trim();
            const image = currentImageData;

            if (!name || !category || price < 0 || stock < 0) {
                alert('Please complete all required fields.');
                return;
            }

            if (editingProductId) {
                admin.updateProduct(editingProductId, name, category, price, stock, description, status, image);
            } else {
                admin.addProduct(name, category, price, stock, description, image);
            }

            renderProductsTable();
            closeProductModal();
        }

        function removeProduct(id) {
            if (!confirm('Delete this product?')) return;
            admin.removeProduct(id);
            renderProductsTable();
        }

        document.getElementById('productImage').addEventListener('change', handleImageChange);
        document.getElementById('productForm').addEventListener('submit', saveProduct);

        document.addEventListener('DOMContentLoaded', () => {
            if (!auth.isLoggedIn() || !auth.isAdmin()) {
                window.location.href = 'login.html';
                return;
            }
            if (!admin) return;
            const user = auth.getCurrentUser();
            if (user) {
                document.getElementById('adminProfileLabel').textContent = user.fullName || user.email;
                document.getElementById('adminAvatar').textContent = (user.fullName || user.email).charAt(0).toUpperCase();
            }
            populateCategoryOptions();
            renderProductsTable();
        });
    </script>
</body>
</html>
